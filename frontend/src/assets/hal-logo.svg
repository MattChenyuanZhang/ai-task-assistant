<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff2200" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#cc1100" stop-opacity="1"/>
      <stop offset="100%" stop-color="#440000" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="outerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff2200" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff2200" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="#0a0a0a"/>

  <!-- Outer glow ring -->
  <circle cx="100" cy="80" r="44" fill="url(#outerGlow)"/>

  <!-- Eye ring -->
  <circle cx="100" cy="80" r="36" fill="none" stroke="#333" stroke-width="2"/>

  <!-- Eye -->
  <circle cx="100" cy="80" r="30" fill="url(#eyeGlow)" filter="url(#glow)"/>

  <!-- Inner pupil -->
  <circle cx="100" cy="80" r="10" fill="#1a0000"/>
  <circle cx="100" cy="80" r="5"  fill="#000"/>

  <!-- Lens reflection -->
  <circle cx="110" cy="70" r="5" fill="white" opacity="0.12"/>

  <!-- HAL text -->
  <text
    x="100" y="148"
    font-family="'Courier New', Courier, monospace"
    font-size="36"
    font-weight="bold"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="8"
    filter="url(#glow)"
  >HAL</text>

  <!-- Subtitle -->
  <text
    x="100" y="170"
    font-family="'Courier New', Courier, monospace"
    font-size="10"
    fill="#666666"
    text-anchor="middle"
    letter-spacing="4"
  >INTELLIGENCE</text>
</svg>
